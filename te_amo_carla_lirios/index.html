<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Te amo, Carla</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="scene">
    <div class="sky-glow"></div>
    <div class="stars" id="stars" aria-hidden="true"></div>
    <div class="sparkles" id="sparkles" aria-hidden="true"></div>
    <div class="hearts" id="hearts" aria-hidden="true"></div>

    <section class="message">
      <span class="eyebrow">Para la niña más preciosa</span>
      <h1>Te amo, Carla</h1>
      <h2>Preciosa, mi lirio favorito</h2>
      <p>
        Un jardincito cursi, brillante y lleno de lirios bonitos,
        porque tu nombre merece verse delicado, romántico y especial.
      </p>
    </section>

    <div class="mist mist-back"></div>

    <section class="garden" aria-label="Jardín romántico de lirios">
      <div class="petal-rain" id="petalRain" aria-hidden="true"></div>
      <div class="mini-flowers mini-left"></div>
      <div class="mini-flowers mini-right"></div>
      <div class="grass grass-back" id="grassBack"></div>
      <div class="lilies" id="lilyField"></div>
      <div class="grass grass-front" id="grassFront"></div>
      <div class="ground-glow"></div>
      <div class="ground"></div>
    </section>

    <div class="mist mist-front"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
